<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت | عمارت 5 دری</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#0f6d45;
--secondary:#18b26c;
--bg:#f5f7f8;
--white:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:var(--bg);
}

/* Login */

.login-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.5),
rgba(0,0,0,.5)),
url("hero.jpg");
background-size:cover;
}

.login-box{
background:white;
padding:40px;
width:400px;
border-radius:20px;
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:var(--primary);
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.login-box button{
width:100%;
padding:15px;
background:var(--primary);
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

/* Dashboard */

.dashboard{
display:none;
}

.sidebar{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:var(--primary);
color:white;
padding:25px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:15px 0;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,.15);
}

.main{
margin-right:260px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.card h3{
margin-bottom:10px;
color:var(--primary);
}

.card span{
font-size:30px;
font-weight:bold;
}

.form-box{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:30px;
}

.form-box input,
.form-box select{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
}

.form-box button{
background:var(--primary);
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
cursor:pointer;
}

.products-list{
background:white;
padding:25px;
border-radius:20px;
}

.product-item{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #eee;
}

.product-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.delete-btn{
background:#e63946;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}

.edit-btn{
background:#ffb703;
border:none;
padding:10px 15px;
color:black;
border-radius:8px;
cursor:pointer;
margin-left:5px;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-right:0;
}

}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-page" id="loginPage">

<div class="login-box">

<h2>ورود مدیریت</h2>

<input
type="password"
id="password"
placeholder="رمز عبور">

<button onclick="login()">
ورود
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="sidebar">

<h2>عمارت 5 دری</h2>

<ul>

<li>📊 داشبورد</li>
<li>📦 محصولات</li>
<li>➕ افزودن محصول</li>
<li>⚙️ تنظیمات</li>

</ul>

</div>

<div class="main">

<div class="cards">

<div class="card">

<h3>تعداد محصولات</h3>

<span id="productCount">
0
</span>

</div>

<div class="card">

<h3>بازدید سایت</h3>

<span id="siteViews">
0
</span>

</div>

</div>

<div class="form-box">

<h3>افزودن محصول</h3>

<input
type="text"
id="title"
placeholder="نام محصول">

<input
type="number"
id="price"
placeholder="قیمت">

<select id="category">

<option>کاغذ دیواری</option>
<option>پرده</option>
<option>قرنیز</option>
<option>تی وی وال</option>

</select>

<input
type="file"
id="imageFile"
accept="image/*">

<button onclick="addProduct()">
ثبت محصول
</button>

</div>

<div class="products-list">

<h3>لیست محصولات</h3>

<div id="productsList">

</div>

</div>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
